{% extends 'dashboard/base.html' %}
{% block head_title %}Delete Product - {{ block.super }}{% endblock %}

{% block content %}
<div class="bg-white shadow rounded-lg p-6 max-w-lg mx-auto text-center">
  <h1 class="text-2xl font-semibold mb-4">Delete Product</h1>
  <p class="mb-6">Are you sure you want to delete <strong>{{ product.name }}</strong>?</p>

  <form method="post">
    {% csrf_token %}
    <div class="flex justify-center space-x-3">
      <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Yes, Delete</button>
      <a href="{% url 'product_list' %}" class="bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
